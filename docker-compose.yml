version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: career_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_worker
    command: python3 src/workers/mass_scheduler.py
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_scheduler
    command: python3 src/discovery/scheduler/main_scheduler.py
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
