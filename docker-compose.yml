version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: career_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_worker
    command: python3 src/workers/mass_scheduler.py
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career_scheduler
    command: python3 src/discovery/scheduler/main_scheduler.py
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  db:
    image: pgvector/pgvector:pg16
    container_name: career_db
    ports:
      - "127.0.0.1:5433:5432"
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${OPERATIONAL_DB_NAME:-careerautomated}
      - POSTGRES_USER=${OPERATIONAL_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${OPERATIONAL_DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-careerautomated}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  pgbackups:


